name: Build & Test

on: [push, pull_request]

jobs:
  native-core:
    name: Native C core (sanitized)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build CLI (warnings as errors)
        run: gcc src/cli.c -Iinclude -o jurischain -O2 -Wall -Wextra -Werror
      - name: Run CLI
        run: ./jurischain 8 CI_Seed
      - name: Core test under UBSan + ASan
        run: make test-c

  native-php:
    name: PHP extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Build extension (self-contained, as PIE does)
        run: |
          cd bindings/php
          phpize
          ./configure
          make -j"$(nproc)"
      - name: Run integration test
        run: php -dextension=bindings/php/modules/jurischain.so -d assert.exception=1 tests/test_php.php
      - name: Run phpt test
        run: |
          cd bindings/php
          php run-tests.php -d extension="$(pwd)/modules/jurischain.so" -q tests/juschain.phpt

  pie-package:
    name: PIE package (PHP extension)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - name: Validate composer.json
        run: composer validate
      - name: Download PIE
        run: |
          curl -fsSL -o /usr/local/bin/pie \
            https://github.com/php/pie/releases/latest/download/pie.phar
          chmod +x /usr/local/bin/pie
      - name: Build extension via PIE
        # Register the checkout as a local path repository, then build the
        # package from it — the same phpize/configure/make pipeline users
        # get from `pie install credithub/jurischain`.
        run: |
          pie repository:add path .
          pie build "credithub/jurischain:*@dev"

  native-node:
    name: Node native addon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build addon
        run: |
          cd bindings/node
          npm install
      - name: Run integration test
        run: node tests/test_node.js

  python:
    name: Python smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build native CLI
        run: make cli
      - name: Run smoke test
        run: python3 tests/test_python.py

  build-asm:
    name: ASM.js Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mymindstorm/setup-emsdk@v14
      - run: make all
      - run: node dist/jurischain-cli.js 5 CI_Seed

  test-docker:
    name: Docker Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./build.sh test
